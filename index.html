<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Stadium Live — Cyber-Pulse Experience">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <!-- Fonts & Icons -->

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#BF00FF", // Fuchsia neon
            "secondary": "#00FBFF", // Cyan neon
            "background": "#050505",
            "surface": "#0E0E0E",
            "surface-variant": "#1A1A1A",
            "on-surface": "#FFFFFF",
            "on-primary": "#000000",
            "error": "#FF3D00"
          },
          borderRadius: {
            "DEFAULT": "1.5rem",
            "lg": "2.5rem",
            "xl": "4rem",
            "full": "9999px"
          },
          fontFamily: {
            "headline": ["Space Grotesk", "sans-serif"],
            "body": ["Be Vietnam Pro", "sans-serif"],
            "label": ["Space Grotesk", "sans-serif"]
          }
        },
      }
    }
  </script>

  <!-- Custom Globals -->
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .neon-pulse-fuchsia {
      box-shadow: 0 0 15px rgba(191, 0, 255, 0.4);
      border: 1px solid rgba(191, 0, 255, 0.3);
    }
    .neon-pulse-cyan {
      box-shadow: 0 0 15px rgba(0, 251, 255, 0.4);
      border: 1px solid rgba(0, 251, 255, 0.3);
    }
    .glass-cyber {
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .kinetic-gradient {
      background: linear-gradient(135deg, #BF00FF 0%, #7000FF 100%);
    }
    body {
      background-color: #050505;
      color: #ffffff;
      min-height: 100dvh;
    }
    .text-neon-cyan {
      color: #00FBFF;
      text-shadow: 0 0 10px rgba(0, 251, 255, 0.5);
    }
    .text-neon-fuchsia {
      color: #BF00FF;
      text-shadow: 0 0 10px rgba(191, 0, 255, 0.5);
    }

    /* View Transitions */
    .view { display: none; animation: fade-in 0.3s ease-out; }
    .view.active { display: block; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Custom Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(100%); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up { animation: fadeInUp 0.5s ease-out both; }
    .animate-fade-in-down { animation: fadeInDown 0.5s ease-out both; }
    .animate-scale-in { animation: scaleIn 0.4s ease-out both; }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* Page Container */
    .page-container {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      height: 100dvh;
    }

    /* No Scrollbar Utility */
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* Typing Indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #BF00FF;
      animation: typingBounce 1.2s infinite ease-in-out;
    }
    .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* Heat Map Overlay for Map View */
    .heat-map-overlay {
      background:
        radial-gradient(ellipse at 30% 40%, rgba(239,68,68,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 60%, rgba(251,146,60,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 30%, rgba(16,185,129,0.08) 0%, transparent 50%);
    }

    /* Toast */
    #toast-container {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }
    .toast {
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(10px);
      border-left: 4px solid #00FBFF;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0, 251, 255, 0.2);
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast-success { border-left-color: #10B981; }
    .toast-warning { border-left-color: #FBBF24; }
    .toast-danger { border-left-color: #EF4444; }
  </style>

</head>
